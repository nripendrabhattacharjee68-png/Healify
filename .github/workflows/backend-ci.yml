name: Backend CI

on:
  push:
    paths:
      - "mvp/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "mvp/backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mvp/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/server.js

      - name: Start API
        run: |
          npm run start > /tmp/helify-api.log 2>&1 &
          echo $! > /tmp/helify-api.pid

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8787/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/helify-api.log
          exit 1

      - name: Smoke test
        run: ./scripts/smoke.sh http://localhost:8787

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/helify-api.pid ]; then
            kill "$(cat /tmp/helify-api.pid)" || true
          fi

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: helify-backend-log
          path: /tmp/helify-api.log
